<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin — Meenahs Henna Art</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Jost:wght@300;400;500&display=swap"
        rel="stylesheet" />
    <style>
        * *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --cream: #fdf6ee;
            --cream-dark: #f5e9d8;
            --amber: #c4882a;
            --terra: #8b4513;
            --terra-dark: #5c2e0a;
            --gold-light: #f0d080;
            --text: #3a2010;
            --text-mid: #6b3a1f;
            --text-light: #9a6840;
            --border: #e2c9a0;
            --shadow: rgba(139, 69, 19, 0.12);
            --font-display: 'Cormorant Garamond', serif;
            --font-body: 'Jost', sans-serif;
        }

        body {
            font-family: var(--font-body);
            background: var(--cream);
            color: var(--text);
            min-height: 100vh;
        }

        /* ── Login Screen ── */
        .login-screen {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, var(--terra-dark), var(--terra));
        }

        .login-box {
            background: white;
            border-radius: 20px;
            padding: 3rem 2.5rem;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            text-align: center;
        }

        .login-logo {
            font-family: var(--font-display);
            font-size: 1.8rem;
            color: var(--terra-dark);
            margin-bottom: 0.3rem;
        }

        .login-sub {
            font-size: 0.7rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--text-light);
            margin-bottom: 2rem;
        }

        .login-box input {
            width: 100%;
            padding: 0.8rem 1rem;
            border: 1.5px solid var(--border);
            border-radius: 8px;
            font-family: var(--font-body);
            font-size: 0.9rem;
            color: var(--text);
            background: var(--cream);
            margin-bottom: 1rem;
            outline: none;
            transition: border-color 0.2s;
        }

        .login-box input:focus {
            border-color: var(--amber);
        }

        .login-btn {
            width: 100%;
            padding: 0.9rem;
            background: linear-gradient(135deg, var(--terra-dark), var(--terra));
            color: white;
            border: none;
            border-radius: 8px;
            font-family: var(--font-body);
            font-size: 0.85rem;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .login-btn:hover {
            opacity: 0.9;
        }

        .login-error {
            color: #c0392b;
            font-size: 0.8rem;
            margin-top: 0.8rem;
            display: none;
        }

        /* ── Dashboard ── */
        .dashboard {
            display: none;
        }

        .dash-header {
            background: linear-gradient(135deg, var(--terra-dark), var(--terra));
            padding: 1.2rem 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .dash-header h1 {
            font-family: var(--font-display);
            color: var(--cream);
            font-size: 1.5rem;
            font-weight: 300;
        }

        .dash-header span {
            color: var(--gold-light);
            font-size: 0.75rem;
            letter-spacing: 0.1em;
        }

        .logout-btn {
            background: rgba(255, 255, 255, 0.15);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 0.4rem 1rem;
            border-radius: 20px;
            font-family: var(--font-body);
            font-size: 0.75rem;
            cursor: pointer;
            transition: background 0.2s;
        }

        .logout-btn:hover {
            background: rgba(255, 255, 255, 0.25);
        }

        .dash-body {
            max-width: 1000px;
            margin: 0 auto;
            padding: 2rem 1.2rem;
        }

        .stats-bar {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: white;
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1.2rem;
            text-align: center;
            box-shadow: 0 2px 12px var(--shadow);
        }

        .stat-card .num {
            font-family: var(--font-display);
            font-size: 2rem;
            color: var(--amber);
            font-weight: 600;
            line-height: 1;
        }

        .stat-card .label {
            font-size: 0.68rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--text-light);
            margin-top: 0.3rem;
        }

        .section-title {
            font-family: var(--font-display);
            font-size: 1.5rem;
            color: var(--terra-dark);
            margin-bottom: 1rem;
            font-weight: 400;
        }

        .bookings-list {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .booking-card {
            background: white;
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 1.4rem 1.6rem;
            box-shadow: 0 2px 12px var(--shadow);
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 1rem;
            align-items: start;
        }

        .booking-card.confirmed {
            border-left: 4px solid #27ae60;
        }

        .booking-card.rejected {
            border-left: 4px solid #e74c3c;
            opacity: 0.7;
        }

        .booking-card.pending {
            border-left: 4px solid var(--amber);
        }

        .booking-id {
            font-size: 0.65rem;
            letter-spacing: 0.15em;
            color: var(--text-light);
            text-transform: uppercase;
            margin-bottom: 0.5rem;
        }

        .client-name {
            font-family: var(--font-display);
            font-size: 1.3rem;
            color: var(--terra-dark);
            font-weight: 600;
        }

        .booking-details {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem 1.5rem;
            margin-top: 0.6rem;
        }

        .detail-item {
            font-size: 0.8rem;
            color: var(--text-mid);
        }

        .detail-item span {
            font-weight: 500;
            color: var(--terra);
        }

        .booking-actions {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            align-items: flex-end;
        }

        .status-badge {
            font-size: 0.65rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            padding: 0.25rem 0.8rem;
            border-radius: 20px;
            font-weight: 500;
        }

        .status-badge.pending {
            background: #fff3cd;
            color: #856404;
        }

        .status-badge.confirmed {
            background: #d4edda;
            color: #155724;
        }

        .status-badge.rejected {
            background: #f8d7da;
            color: #721c24;
        }

        .action-btns {
            display: flex;
            gap: 0.5rem;
        }

        .btn-confirm {
            padding: 0.45rem 1rem;
            background: #27ae60;
            color: white;
            border: none;
            border-radius: 8px;
            font-family: var(--font-body);
            font-size: 0.75rem;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .btn-confirm:hover {
            opacity: 0.85;
        }

        .btn-reject {
            padding: 0.45rem 1rem;
            background: #e74c3c;
            color: white;
            border: none;
            border-radius: 8px;
            font-family: var(--font-body);
            font-size: 0.75rem;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .btn-reject:hover {
            opacity: 0.85;
        }

        .btn-whatsapp {
            padding: 0.45rem 1rem;
            background: #25d366;
            color: white;
            border: none;
            border-radius: 8px;
            font-family: var(--font-body);
            font-size: 0.75rem;
            cursor: pointer;
            transition: opacity 0.2s;
            text-decoration: none;
            display: inline-block;
        }

        .btn-whatsapp:hover {
            opacity: 0.85;
        }

        .btn-delete {
            padding: 0.45rem 0.8rem;
            background: transparent;
            color: var(--text-light);
            border: 1px solid var(--border);
            border-radius: 8px;
            font-family: var(--font-body);
            font-size: 0.75rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-delete:hover {
            background: #f8d7da;
            color: #721c24;
            border-color: #f5c6cb;
        }

        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            color: var(--text-light);
        }

        .empty-state .icon {
            font-size: 3rem;
            margin-bottom: 1rem;
        }

        .empty-state p {
            font-size: 0.9rem;
        }

        @media (max-width: 600px) {
            .stats-bar {
                grid-template-columns: 1fr 1fr;
            }

            .booking-card {
                grid-template-columns: 1fr;
            }

            .booking-actions {
                align-items: flex-start;
            }
        }
    </style>
</head>

<body>

    <!-- ── LOGIN SCREEN ── -->
    <div class="login-screen" id="loginScreen">
        <div class="login-box">
            <div class="login-logo">Meenahs Henna Art</div>
            <div class="login-sub">Admin Portal</div>
            <input type="text" id="usernameInput" placeholder="Username" autocomplete="off" />
            <input type="password" id="passwordInput" placeholder="Password" />
            <button class="login-btn" onclick="adminLogin()">Login</button>
            <div class="login-error" id="loginError">Incorrect username or password.</div>
        </div>
    </div>

    <!-- ── DASHBOARD ── -->
    <div class="dashboard" id="dashboard">
        <div class="dash-header">
            <div>
                <h1>Admin Dashboard</h1>
                <span>Meenahs Henna Art</span>
            </div>
            <button class="logout-btn" onclick="adminLogout()">Logout</button>
        </div>

        <div class="dash-body">
            <div class="stats-bar">
                <div class="stat-card">
                    <div class="num" id="statTotal">0</div>
                    <div class="label">Total Bookings</div>
                </div>
                <div class="stat-card">
                    <div class="num" id="statPending">0</div>
                    <div class="label">Pending</div>
                </div>
                <div class="stat-card">
                    <div class="num" id="statConfirmed">0</div>
                    <div class="label">Confirmed</div>
                </div>
                <div class="stat-card">
                    <div class="num" id="statRejected">0</div>
                    <div class="label">Rejected</div>
                </div>
            </div>

            <h2 class="section-title">All Bookings</h2>
            <div class="bookings-list" id="bookingsList"></div>
        </div>
    </div>

    <script>
        // ══════════════════════════════════════════
        // CHANGE THESE TO YOUR OWN LOGIN DETAILS
        const ADMIN_USERNAME = '@meenah';
        const ADMIN_PASSWORD = 'derry123';
        // ══════════════════════════════════════════

        // ── Check if already logged in ──
        if (sessionStorage.getItem('meenahs_admin') === 'true') {
            showDashboard();
        }

        // ── Login ──
        function adminLogin() {
            const username = document.getElementById('usernameInput').value.trim();
            const password = document.getElementById('passwordInput').value;

            if (username === ADMIN_USERNAME && password === ADMIN_PASSWORD) {
                sessionStorage.setItem('meenahs_admin', 'true');
                document.getElementById('loginError').style.display = 'none';
                showDashboard();
            } else {
                document.getElementById('loginError').style.display = 'block';
                document.getElementById('passwordInput').value = '';
            }
        }

        // Allow pressing Enter to login
        document.getElementById('passwordInput').addEventListener('keydown', e => {
            if (e.key === 'Enter') adminLogin();
        });

        // ── Logout ──
        function adminLogout() {
            sessionStorage.removeItem('meenahs_admin');
            document.getElementById('dashboard').style.display = 'none';
            document.getElementById('loginScreen').style.display = 'flex';
        }

        // ── Show Dashboard ──
        function showDashboard() {
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('dashboard').style.display = 'block';
            loadBookings();
        }

        // ── Load Bookings ──
        function loadBookings() {
            const bookings = JSON.parse(localStorage.getItem('meenahs_bookings') || '[]');
            const list = document.getElementById('bookingsList');

            // Update stats
            document.getElementById('statTotal').textContent = bookings.length;
            document.getElementById('statPending').textContent = bookings.filter(b => b.status === 'confirmed' || b.status === 'pending').length;
            document.getElementById('statConfirmed').textContent = bookings.filter(b => b.status === 'approved').length;
            document.getElementById('statRejected').textContent = bookings.filter(b => b.status === 'rejected').length;

            if (bookings.length === 0) {
                list.innerHTML = `
          <div class="empty-state">
            <div class="icon">🌸</div>
            <p>No bookings yet. They'll show up here once customers start booking.</p>
          </div>`;
                return;
            }

            // Sort newest first
            const sorted = [...bookings].reverse();

            list.innerHTML = sorted.map((b, i) => {
                const realIndex = bookings.length - 1 - i;
                const status = b.status || 'pending';
                const phone = b.client?.phone || '';
                const cleanPhone = phone.replace(/\D/g, '');

                // Pre-written WhatsApp confirm message
                const confirmMsg = encodeURIComponent(
                    `Hi ${b.client?.name || 'there'}, your Meenahs Henna Art appointment for ${b.appointment?.date} at ${b.appointment?.time} has been CONFIRMED! ✅🌸 We look forward to seeing you. For any questions, feel free to reply here or check our contact page.`
                );

                // Pre-written WhatsApp reject message
                const rejectMsg = encodeURIComponent(
                    `Hi ${b.client?.name || 'there'}, unfortunately your Meenahs Henna Art booking for ${b.appointment?.date} at ${b.appointment?.time} could not be confirmed at this time. ❌ Please contact us via WhatsApp or visit our contact page to reschedule. We're sorry for the inconvenience!`
                );

                return `
          <div class="booking-card ${status === 'approved' ? 'confirmed' : status === 'rejected' ? 'rejected' : 'pending'}" id="card-${realIndex}">
            <div>
              <div class="booking-id">${b.id || 'N/A'}</div>
              <div class="client-name">${b.client?.name || 'Unknown'}</div>
              <div class="booking-details">
                <div class="detail-item">📅 <span>${b.appointment?.date || '-'}</span></div>
                <div class="detail-item">🕐 <span>${b.appointment?.time || '-'}</span></div>
                <div class="detail-item">📞 <span>${b.client?.phone || '-'}</span></div>
                <div class="detail-item">📧 <span>${b.client?.email || '-'}</span></div>
                <div class="detail-item">🌿 <span>${b.service?.hennaType || '-'}</span></div>
                <div class="detail-item">🖐 <span>${b.service?.bodyArea || '-'}</span></div>
                <div class="detail-item">📍 <span>${b.service?.location || '-'}</span></div>
                <div class="detail-item">💳 <span>${b.service?.payment || '-'}</span></div>
                ${b.notes ? `<div class="detail-item">📝 <span>${b.notes}</span></div>` : ''}
              </div>
            </div>
            <div class="booking-actions">
              <span class="status-badge ${status === 'approved' ? 'confirmed' : status === 'rejected' ? 'rejected' : 'pending'}">
                ${status === 'approved' ? 'Confirmed' : status === 'rejected' ? 'Rejected' : 'Pending'}
              </span>
              <div class="action-btns">
                <button class="btn-confirm" onclick="updateStatus(${realIndex}, 'approved')">✓ Confirm</button>
                <button class="btn-reject" onclick="updateStatus(${realIndex}, 'rejected')">✗ Reject</button>
              </div>
              <div class="action-btns">
                <a class="btn-whatsapp" href="https://wa.me/${cleanPhone}?text=${confirmMsg}" target="_blank">💬 Send Confirm</a>
                <a class="btn-whatsapp" href="https://wa.me/${cleanPhone}?text=${rejectMsg}" target="_blank" style="background:#e67e22">💬 Send Reject</a>
              </div>
              <button class="btn-delete" onclick="deleteBooking(${realIndex})">🗑 Delete</button>
            </div>
          </div>`;
            }).join('');
        }

        // ── Update Booking Status ──
        function updateStatus(index, newStatus) {
            const bookings = JSON.parse(localStorage.getItem('meenahs_bookings') || '[]');
            bookings[index].status = newStatus;
            localStorage.setItem('meenahs_bookings', JSON.stringify(bookings));
            loadBookings();
        }

        // ── Delete Booking ──
        function deleteBooking(index) {
            if (!confirm('Are you sure you want to delete this booking?')) return;
            const bookings = JSON.parse(localStorage.getItem('meenahs_bookings') || '[]');
            bookings.splice(index, 1);
            localStorage.setItem('meenahs_bookings', JSON.stringify(bookings));
            loadBookings();
        }
    </script>

</body>

</html>
